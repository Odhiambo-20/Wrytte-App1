name: ux
description: A Flutter biometric enrollment application.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  camera: "0.11.0+2"
  google_mlkit_face_detection: "0.13.1"
  http: "1.6.0"
  image: "^4.3.0"
  permission_handler: "11.4.0"
  shared_preferences: "^2.3.0"
  tflite_flutter: "^0.11.0"
  video_thumbnail: "^0.5.3"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: "4.0.0"

flutter:
  uses-material-design: true
  assets:
    - assets/models/mobilefacenet.tflite
